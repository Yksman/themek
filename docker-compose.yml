services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: themek
      POSTGRES_USER: themek
      POSTGRES_PASSWORD: themek
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "themek"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
